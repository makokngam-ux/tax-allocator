/* Water-filling ภายในกลุ่ม: เกลี่ยตามสัดส่วน buffer คงเหลือ ไม่ให้ใครเกิน */
function autoAllocate(lumpSum, ids, buffers) {
  const alloc = {};
  ids.forEach((id) => (alloc[id] = 0));
  let remaining = lumpSum;
  let active = ids.filter((id) => buffers[id] > 0);
  let guard = 0;
  while (remaining > 0.5 && active.length > 0 && guard < 100) {
    guard++;
    const totalBuf = active.reduce((s, id) => s + (buffers[id] - alloc[id]), 0);
    if (totalBuf <= 0.5) break;
    let capped = false;
    const stillActive = [];
    for (const id of active) {
      const remBuf = buffers[id] - alloc[id];
      const give = remaining * (remBuf / totalBuf);
      if (give >= remBuf - 0.5) { alloc[id] = buffers[id]; capped = true; }
      else { stillActive.push(id); }
    }
    if (capped) { remaining = lumpSum - ids.reduce((s, id) => s + alloc[id], 0); active = stillActive; }
    else {
      const tb = active.reduce((s, id) => s + (buffers[id] - alloc[id]), 0);
      for (const id of active) { alloc[id] += remaining * ((buffers[id] - alloc[id]) / tb); }
      remaining = 0;
    }
  }
  ids.forEach((id) => (alloc[id] = Math.round(alloc[id])));
  // แก้เศษจากการปัด ให้ผลรวมตรงเป๊ะ = min(เงินก้อน, เพดานรวม) → ลิ้งกันไม่มี ±1
  const cap = ids.reduce((s, id) => s + buffers[id], 0);
  const target = Math.min(Math.round(lumpSum), Math.round(cap));
  let diff = target - ids.reduce((s, id) => s + alloc[id], 0);
  let guard2 = 0;
  while (diff !== 0 && guard2 < ids.length * 8 + 8) {
    guard2++;
    if (diff > 0) {
      let best = null, room = 0;
      for (const id of ids) { const r = buffers[id] - alloc[id]; if (r > room) { room = r; best = id; } }
      if (best === null || room <= 0) break;
      alloc[best] += 1; diff -= 1;
    } else {
      let best = null, val = 0;
      for (const id of ids) { if (alloc[id] > val) { val = alloc[id]; best = id; } }
      if (best === null || val <= 0) break;
      alloc[best] -= 1; diff += 1;
    }
  }
  const allocated = ids.reduce((s, id) => s + alloc[id], 0);
  return { alloc, leftover: Math.max(0, Math.round(lumpSum - allocated)) };
}
/* กระจายในกลุ่มโดยมีขั้นต่ำ: ใครได้น้อยกว่า minAlloc ให้ตัดออก (เป็น 0)
   แล้วเกลี่ยเงินไปให้คนที่เหลือเป็นก้อนใหญ่ขึ้น (วนจนไม่มีใครได้ระหว่าง 0–minAlloc) */
function allocateGroupMin(lumpSum, ids, buffers, minAlloc) {
  let pool = ids.filter((id) => buffers[id] >= minAlloc);
  while (pool.length > 0) {
    const r = autoAllocate(lumpSum, pool, buffers);
    let worst = null, worstVal = Infinity;
    for (const id of pool) {
      const a = r.alloc[id] || 0;
      if (a > 0.5 && a < minAlloc && a < worstVal) { worst = id; worstVal = a; }
    }
    if (!worst) return r; // ทุกคนได้ 0 หรือ ≥ minAlloc แล้ว
    pool = pool.filter((id) => id !== worst); // ตัดคนที่ได้น้อยสุดออก แล้วเกลี่ยใหม่
  }
  return { alloc: {}, leftover: Math.max(0, Math.round(lumpSum)) };
}
/* กระจายตามลำดับความสำคัญ
   - เรียงผู้รับตาม: เทียร์ 1 ก่อน (ตามลำดับความสำคัญ) แล้วเทียร์ 2
   - เริ่มที่ maxCount คน (คนแรกๆ ตามลำดับความสำคัญ)
   - ถ้าเงินยังเหลือเพราะคนกลุ่มแรกเต็มเพดาน → ขยายเพิ่มทีละคนจนใส่หมดหรือคนหมด
   - แต่ละคนได้ ≥ ขั้นต่ำ และไม่เกินเพดาน */
function allocatePriorityTiered(lumpSum, tier1Ids, tier2Ids, buffers, minAlloc, maxCount) {
  const ordered = [...tier1Ids, ...tier2Ids];
  const alloc = {};
  ordered.forEach((id) => (alloc[id] = 0));
  const eligible = ordered.filter((id) => buffers[id] >= minAlloc);
  if (lumpSum <= 0.5 || eligible.length === 0) {
    return { alloc, leftover: Math.max(0, Math.round(lumpSum)) };
  }
  let count = Math.min(maxCount, eligible.length);
  let r = allocateGroupMin(lumpSum, eligible.slice(0, count), buffers, minAlloc);
  while (r.leftover > 0.5 && count < eligible.length) {
    count++;
    r = allocateGroupMin(lumpSum, eligible.slice(0, count), buffers, minAlloc);
  }
  eligible.slice(0, count).forEach((id) => (alloc[id] = r.alloc[id] || 0));
  return { alloc, leftover: r.leftover };
}

/* ทำให้ยอด auto ดูเป็นธรรมชาติ ไม่ลงตัวกลม + ต่างกันรายคน
   ใช้การโอนระหว่างคู่แบบ zero-sum → ผลรวมเท่าเดิมเป๊ะ และไม่มีใครเกินเพดาน */
function hashUnit(seed) {
  let h = 2166136261; const s = String(seed);
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return ((h >>> 0) % 100000) / 100000; // 0..1
}
/* ระยะกันเพดานของแต่ละคน (สุ่มแบบคงที่ต่อคน) → auto จะไม่ลงเต็มเพดานเป๊ะ ดูเป็นธรรมชาติ */
function marginOf(id) { return 1200 + Math.floor(hashUnit(id + "-mg") * 4300); } // ~1,200–5,500
function naturalize(alloc, ids, buffers, seed, minAlloc) {
  const out = { ...alloc };
  const flex = ids.filter((id) => out[id] > 0);
  if (flex.length < 2) return out;
  // โอนเงินก้อนเล็ก (ไม่กลม) แบบวงแหวน ให้ทุกคนได้ยอดไม่ลงตัวและต่างกัน
  for (let i = 0; i < flex.length; i++) {
    const a = flex[i], b = flex[(i + 1) % flex.length];
    if (a === b) continue;
    const u = hashUnit(a + "|" + b + "|" + seed);
    let m = 123 + Math.floor(u * 740);          // 123..862 (ค่าไม่กลม)
    m = Math.min(m, out[a] - minAlloc, buffers[b] - out[b]); // a ต้องเหลือ ≥ ขั้นต่ำ, b ไม่เกินเพดาน
    if (m <= 0) continue;
    out[a] -= m; out[b] += m;
  }
  return out;
}

  const grandTotal = useMemo(() => Object.values(totals).reduce((s, v) => s + v, 0), [totals]);

  const totalBuffer = useMemo(
    () => people.reduce((s, p) => s + Math.max(0, p.ceiling - totals[p.id]), 0),
    [people, totals]
  );

  // หัก ณ ที่จ่าย 5% รวมทุกคน (ยกเว้นธีรวัฒน์ / tier 0)
  const totalWHT = useMemo(
    () => people.reduce((s, p) => s + (p.tier === 0 ? 0 : totals[p.id] * WHT_RATE), 0),
    [people, totals]
  );

  const buffersExclMonth = useMemo(() => {
    const b = {};
    people.forEach((p) => {
      const excl = totals[p.id] - (Number(data[p.id]?.[month]) || 0);
      // กันเพดานไว้เล็กน้อย (สุ่มต่อคน) เพื่อไม่ให้ยอด auto ลงเต็มเพดานเป๊ะ
      const effCeil = p.tier === 0 ? p.ceiling : Math.max(0, p.ceiling - marginOf(p.id));
      b[p.id] = Math.max(0, effCeil - excl);
    });
    return b;
  }, [people, totals, data, month]);

  const statusOf = useCallback((id) => {
    const p = people.find((x) => x.id === id);
    if (!p) return "ok";
    if (p.tier === 0) return "ok"; // ธีรวัฒน์เกินเพดานได้ (แสดงสถานะแยกต่างหาก ไม่นับเป็น over)
    if (totals[id] > p.ceiling + 0.5) return "over";
    if (p.ceiling > 0 && totals[id] / p.ceiling >= 0.9) return "warn";
    return "ok";
  }, [people, totals]);

  const counts = useMemo(() => {
    let ok = 0, warn = 0, over = 0;
    people.forEach((p) => { const s = statusOf(p.id); s === "over" ? over++ : s === "warn" ? warn++ : ok++; });
    return { ok, warn, over };
  }, [people, statusOf]);

  // จำนวนเดือนที่มียอด (> 0) ของแต่ละคน
  const monthsOf = useCallback(
    (id) => (data[id] || []).reduce((c, v) => c + (Number(v) > 0 ? 1 : 0), 0),
    [data]
  );

  const monthly = useMemo(
    () => MONTHS.map((_, mi) => people.reduce((s, p) => s + (Number(data[p.id]?.[mi]) || 0), 0)),
    [people, data]
  );
  const maxMonthly = useMemo(() => Math.max(1, ...monthly), [monthly]);

  const setCell = useCallback((id, m, val) => {
    setData((prev) => {
      const next = { ...prev, [id]: [...(prev[id] || Array(12).fill(0))] };
      next[id][m] = Math.max(0, Number(val) || 0);
      return next;
    });
  }, []);
  const setCeiling = useCallback((id, val) => {
    setPeople((prev) => prev.map((p) => (p.id === id ? { ...p, ceiling: Math.max(0, Number(val) || 0) } : p)));
  }, []);
  const setName = useCallback((id, val) => {
    setPeople((prev) => prev.map((p) => (p.id === id ? { ...p, name: val } : p)));
  }, []);
  const movePerson = useCallback((id, dir) => {
    setPeople((prev) => {
      const i = prev.findIndex((p) => p.id === id);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= prev.length) return prev;
      const next = [...prev];
      const [it] = next.splice(i, 1);
      next.splice(j, 0, it);
      return next;
    });
  }, []);

  const runPreview = () => {
    const sum = Number(lump) || 0;
    if (sum <= 0) { setPreview(null); return; }
    // ธีรวัฒน์รับส่วนของตัวเองก่อน (ไม่เกินยอดก้อน) แล้วเฉลี่ยส่วนที่เหลือให้คนอื่น
    const boyGet = Math.max(0, Math.min(Number(boyAmt) || 0, sum));
    const distributeAmount = Math.max(0, sum - boyGet);
    const t1 = people.filter((p) => p.tier === 1 && selected[p.id]).map((p) => p.id);
    const t2 = people.filter((p) => p.tier === 2 && selected[p.id]).map((p) => p.id);
    const r = allocatePriorityTiered(distributeAmount, t1, t2, buffersExclMonth, MIN_ALLOC, MAX_RECIPIENTS);
    const ids = [...t1, ...t2];
    // ทำให้ยอดต่อคนไม่ลงตัวกลม & ต่างกัน (ผลรวมเท่าเดิม, ไม่เกินเพดาน, ไม่ต่ำกว่าขั้นต่ำ)
    const alloc = naturalize(r.alloc, ids, buffersExclMonth, "m" + month, MIN_ALLOC);
    setPreview({ alloc, leftover: r.leftover, ids, boyGet, total: sum });
  };

  /* ---------------- Google Sheet sync อัตโนมัติ (เรียลไทม์ หลายเครื่อง) ---------------- */
  const peopleRef = useRef(people); peopleRef.current = people;
  const dataRef = useRef(data); dataRef.current = data;
  const endpointRef = useRef(endpoint); endpointRef.current = endpoint;
  const syncedHash = useRef("__init__"); // hash ของสถานะที่ตรงกับชีตล่าสุด (กัน loop)
  const remoteUpdatedAt = useRef(0);
  const pushTimer = useRef(null);

  const hashState = (ppl, dat) =>
    JSON.stringify({ p: ppl.map((x) => [x.id, x.name, x.ceiling, x.tier]), d: dat });

  const mergeRemote = (rPeople) => {
    const out = (rPeople || []).map((r) => {
      const d = DEFAULT_PEOPLE.find((dd) => dd.id === r.id) || {};
      // รหัส (nid/pcode/bcode) ดึงจากชีตส่วนตัวก่อน ถ้าไม่มีค่อย fallback ค่าเริ่มต้น
      return { ...d, ...r, name: r.name ?? d.name, nid: r.nid || d.nid || "", pcode: r.pcode || d.pcode || "", bcode: r.bcode || d.bcode || "" };
    });
    DEFAULT_PEOPLE.forEach((d) => { if (!out.find((x) => x.id === d.id)) out.push(d); });
    return out;
  };

  const cloudPull = useCallback(async (initial) => {
    const ep = endpointRef.current;
    if (!ep) return;
    try {
      const res = await fetch(ep);
      const j = await res.json();
      if (!j || !Array.isArray(j.people) || !j.data) return;
      const remoteAt = Number(j.updatedAt) || 0;
      if (!initial && remoteAt <= remoteUpdatedAt.current) return; // ไม่มีอัปเดตใหม่
      if (j.people.length === 0) return;                            // ชีตยังว่าง อย่าทับ local
      const rPeople = mergeRemote(j.people);
      const rh = hashState(rPeople, j.data);
      remoteUpdatedAt.current = Math.max(remoteUpdatedAt.current, remoteAt);
      if (rh === syncedHash.current) return;                        // เหมือนของที่มีอยู่แล้ว
      syncedHash.current = rh;                                       // กันไม่ให้ auto-save ดันกลับ
      setPeople(rPeople);
      setData(j.data);
      setSyncStatus("ซิงก์ล่าสุด " + new Date().toLocaleTimeString("th-TH"));
    } catch (e) { setSyncStatus("ออฟไลน์ชั่วคราว · จะลองใหม่"); }
  }, []);

  const cloudPush = useCallback(async (h) => {
    const ep = endpointRef.current;
    if (!ep) return;
    try {
      setSyncStatus("กำลังซิงก์…");
      const body = JSON.stringify({
        people: peopleRef.current.map((p) => ({ id: p.id, name: p.name, ceiling: p.ceiling, tier: p.tier, nid: p.nid || "", pcode: p.pcode || "", bcode: p.bcode || "" })),
        data: dataRef.current,
      });
      const res = await fetch(ep, { method: "POST", body }); // text/plain → ไม่มี preflight
      let j = null; try { j = await res.json(); } catch (_) {}
      syncedHash.current = h || hashState(peopleRef.current, dataRef.current);
      remoteUpdatedAt.current = (j && Number(j.updatedAt)) || Date.now();
      setSyncStatus("ซิงก์แล้ว ✓ " + new Date().toLocaleTimeString("th-TH"));
    } catch (e) { setSyncStatus("ซิงก์ไม่สำเร็จ · จะลองใหม่อัตโนมัติ"); }
  }, []);

  // เชื่อมครั้งเดียว: โหลดครั้งแรก + ดึงอัปเดตจากเครื่องอื่นทุก ~12 วินาที
  useEffect(() => {
    if (!loaded || !endpoint) return;
    cloudPull(true);
    const iv = setInterval(() => cloudPull(false), 12000);
    return () => clearInterval(iv);
  }, [loaded, endpoint, cloudPull]);

  // auto-save: เมื่อข้อมูลในเครื่องเปลี่ยน ดันขึ้นชีต (หน่วง 1.5 วิ)
  useEffect(() => {
    if (!loaded || !endpoint) return;
    const h = hashState(people, data);
    if (h === syncedHash.current) return;
    if (pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(() => cloudPush(h), 1500);
    return () => { if (pushTimer.current) clearTimeout(pushTimer.current); };
  }, [people, data, loaded, endpoint, cloudPush]);
  const applyPreview = () => {
    if (!preview) return;
    setData((prev) => {
      const next = { ...prev };
      // ธีรวัฒน์ (ฐานคงที่ที่หักจากเงินก้อนก่อนเฉลี่ย)
      next.boy = [...(prev.boy || Array(12).fill(0))];
      next.boy[month] = preview.boyGet || 0;
      preview.ids.forEach((id) => {
        next[id] = [...(prev[id] || Array(12).fill(0))];
        next[id][month] = preview.alloc[id] || 0;
      });
      return next;
    });
    setPreview(null); setLump("");
  };
  const clearMonth = () => {
    setData((prev) => {
      const next = { ...prev };
      people.forEach((p) => { next[p.id] = [...(prev[p.id] || Array(12).fill(0))]; next[p.id][month] = 0; });
      return next;
    });
    setPreview(null);
  };
  const resetAll = () => {
    if (!window.confirm("ล้างข้อมูลทั้งหมดและกลับเป็นค่าเริ่มต้น (ม.ค.–พ.ค.) ?")) return;
    setPeople(DEFAULT_PEOPLE); setData(initialData());
    setSelected(DEFAULT_PEOPLE.reduce((o, p) => ((o[p.id] = p.tier !== 0), o), {}));
    setPreview(null);
  };

  // ส่งออกตารางทั้งปีเป็น CSV (เปิดใน Excel ได้ · ส่งบัญชี)
  const exportCSV = () => {
    const q = (v) => `"${String(v).replace(/"/g, '""')}"`;
    const rows = [];
    rows.push(["เดือน", ...people.map((p) => p.name), "รวม"]);
    MONTHS.forEach((m, mi) => {
      const rs = people.reduce((s, p) => s + (Number(data[p.id]?.[mi]) || 0), 0);
      rows.push([m, ...people.map((p) => Number(data[p.id]?.[mi]) || 0), rs]);
    });
    rows.push(["รวมทั้งปี", ...people.map((p) => totals[p.id]), grandTotal]);
    rows.push(["เพดาน", ...people.map((p) => p.ceiling), ""]);
    rows.push(["คงเหลือ", ...people.map((p) => p.ceiling - totals[p.id]), ""]);
    rows.push(["หัก ณ ที่จ่าย 5%", ...people.map((p) => (p.tier === 0 ? 0 : Math.round(totals[p.id] * WHT_RATE))), Math.round(totalWHT)]);
    const csv = rows.map((r) => r.map(q).join(",")).join("\r\n");
    try {
      const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "tax-allocator-2569.csv";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    } catch (e) {
      try { navigator.clipboard.writeText(csv); window.alert("ดาวน์โหลดไม่ได้ในหน้านี้ — คัดลอกตาราง CSV ไว้ให้แล้ว วางใน Excel ได้เลย"); } catch (_) {}
    }
  };

  const monthSum = useMemo(
    () => people.reduce((s, p) => s + (Number(data[p.id]?.[month]) || 0), 0),
    [people, data, month]
  );

  if (!loaded) {
    return (
      <div className="ph-bg"><style>{CSS}</style>
        <div className="ph-shell ph-center"><div className="ph-spin" /><span className="ph-load-t">กำลังโหลด…</span></div>
      </div>
    );
  }

  const tier1People = people.filter((p) => p.tier === 1);
  const tier2People = people.filter((p) => p.tier === 2);
  const toneOf = (i) => TONES[i % TONES.length];

  return (
    <div className="ph-bg">
      <style>{CSS}</style>
      <div className="ph-shell">

        <div className="ph-scroll" key={page}>
          {/* ============ HOME ============ */}
          {page === "home" && (
            <div className="ph-page">
              {/* hero */}
              <header className="ph-hero">
                <div className="ph-hero-deco" />
                <div className="ph-hero-top">
                  <span className="ph-hero-chip"><Icon name="wallet" size={14} stroke={2.1} /> กระจายรายได้</span>
                  <button className="ph-hero-icon" onClick={() => setShowSync(true)} aria-label="เชื่อม Google Sheet">
                    <Icon name="cloud" size={16} />{endpoint ? <i className="ph-syncdot" /> : null}
                  </button>
                </div>
                <span className="ph-hero-label">รวมจ่ายทั้งปี · ปีภาษี 2569</span>
                <div className="ph-hero-amt">฿{fmt(grandTotal)}</div>
                <div className="ph-hero-sub">พื้นที่เพดานคงเหลือรวม ฿{fmt(totalBuffer)}</div>
              </header>

              {/* quick cards */}
              <section className="ph-quick">
                <article className="ph-qcard mint">
                  <span className="ph-qic"><Icon name="shield" size={18} /></span>
                  <div><h3>ปลอดภัย</h3><strong>{counts.ok} คน</strong></div>
                </article>
                <article className="ph-qcard butter">
                  <span className="ph-qic"><Icon name="alert" size={18} /></span>
                  <div><h3>ใกล้เต็ม</h3><strong>{counts.warn} คน</strong></div>
                </article>
                <article className="ph-qcard peach">
                  <span className="ph-qic"><Icon name="x" size={18} /></span>
                  <div><h3>เกินเพดาน</h3><strong>{counts.over} คน</strong></div>
                </article>
                <article className="ph-qcard lilac">
                  <span className="ph-qic"><Icon name="coins" size={18} /></span>
                  <div><h3>พื้นที่เหลือ</h3><strong>฿{fmtK(totalBuffer)}</strong></div>
                </article>
              </section>

              {/* หัก ณ ที่จ่าย 5% รวม */}
              <div className="ph-wht-strip">
                <span className="ph-wht-ic"><Icon name="refund" size={20} /></span>
                <div className="ph-wht-info">
                  <b>หัก ณ ที่จ่าย 5%</b>
                  <small>ยอดขอคืนได้รวมทุกคน · ยกเว้นธีรวัฒน์</small>
                </div>
                <strong className="ph-wht-amt">฿{fmt(totalWHT)}</strong>
              </div>

              {/* monthly bar chart */}
              <section className="ph-panel">
                <div className="ph-panel-h">
                  <h2><Icon name="chart" size={17} stroke={2} /> ยอดกระจายรายเดือน</h2>
                  <button className="ph-link" onClick={() => setPage("table")}>ดูตาราง ›</button>
                </div>
                <div className="ph-bars">
                  {monthly.map((v, i) => (
                    <button key={i} className={`ph-bar-col ${i === month ? "on" : ""}`}
                      onClick={() => { setMonth(i); setPage("distribute"); }}>
                      <span className="ph-bar-v">{v ? fmtK(v) : ""}</span>
                      <span className="ph-bar-track">
                        <span className="ph-bar-fill" style={{ height: Math.max(3, (v / maxMonthly) * 100) + "%" }} />
                      </span>
                      <span className="ph-bar-m">{MONTHS_SHORT[i]}</span>
                    </button>
                  ))}
                </div>
              </section>

              {/* people */}
              <section className="ph-panel">
                <div className="ph-panel-h">
                  <h2><Icon name="user" size={17} stroke={2} /> สถานะรายคน</h2>
                  <button className="ph-link" onClick={() => setEditCeiling((v) => !v)}>{editCeiling ? "เสร็จสิ้น" : "แก้เพดาน"}</button>
                </div>
                <div className="ph-people">
                  {people.map((p, i) => {
                    const st = statusOf(p.id);
                    const tone = toneOf(i);
                    const pct = p.ceiling > 0 ? Math.min(100, (totals[p.id] / p.ceiling) * 100) : 0;
                    const buf = p.ceiling - totals[p.id];
                    const boyOver = p.tier === 0 && totals[p.id] > p.ceiling + 0.5;
                    return (
                      <div className={`ph-pcard st-${st}${boyOver ? " boyover" : ""}`} key={p.id} style={{ animationDelay: i * 45 + "ms" }}>
                        <span className={`ph-avatar tone-${tone}${boyOver ? " boyover" : ""}`}>
                          {p.tier === 0 ? <Icon name="lock" size={17} /> : <Icon name="user" size={17} />}
                        </span>
                        <div className="ph-pcard-m">
                          <div className="ph-pcard-top">
                            {editCeiling ? (
                              <input className="ph-name-edit" value={p.name} onChange={(e) => setName(p.id, e.target.value)} placeholder="ชื่อ-นามสกุล" />
                            ) : (
                              <span className="ph-pname-col">
                                <span className="ph-pname">{p.name}{p.tier === 2 && <em className="ph-tag">ทีหลัง</em>}{boyOver && <em className="ph-tag info">เกินเพดาน · อนุญาต</em>}</span>
                                <span className="ph-pmonths">{monthsOf(p.id)} เดือนที่มียอด</span>
                              </span>
                            )}
                            <span className="ph-pamt">฿{fmt(totals[p.id])}</span>
                          </div>
                          <div className="ph-track"><div className={`ph-fill st-${st}${boyOver ? " boyover" : ""}`} style={{ width: (boyOver ? 100 : pct) + "%" }} /></div>
                          <div className="ph-pcard-bot">
                            {editCeiling ? (
                              <span className="ph-ceil-edit">เพดาน ฿<input type="number" value={p.ceiling} onChange={(e) => setCeiling(p.id, e.target.value)} /></span>
                            ) : (
                              <span className="ph-mut">เพดาน ฿{fmt(p.ceiling)}</span>
                            )}
                            <span className={buf < 0 ? (boyOver ? "ph-info-text" : "ph-neg") : "ph-pos"}>{buf < 0 ? "เกิน " : "เหลือ "}฿{fmt(Math.abs(buf))}</span>
                          </div>
                        </div>
                        {editCeiling && (
                          <div className="ph-reorder">
                            <button onClick={() => movePerson(p.id, -1)} disabled={i === 0} aria-label="เลื่อนขึ้น"><Icon name="cup" size={15} stroke={2.5} /></button>
                            <span className="ph-rank">{i + 1}</span>
                            <button onClick={() => movePerson(p.id, 1)} disabled={i === people.length - 1} aria-label="เลื่อนลง"><Icon name="cdown" size={15} stroke={2.5} /></button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </section>

              <p className="ph-note">เครื่องมือนี้ช่วยประเมินเบื้องต้น · เพดาน 300,000 / 150,000 แก้ไขได้ · ลดหย่อนจริงของแต่ละคนต่างกัน แนะนำให้พี่ตา (บัญชี) ตรวจก่อนใช้จริง · บันทึกอัตโนมัติ</p>
            </div>
          )}

          {/* ============ DISTRIBUTE ============ */}
          {page === "distribute" && (
            <div className="ph-page">
              <h1 className="ph-title">กระจายเงินก้อน</h1>
              <p className="ph-sub">เลือกเดือน แล้วใส่เงินก้อนเพื่อเกลี่ยอัตโนมัติ</p>

              <div className="ph-month-strip">
                {MONTHS.map((m, i) => (
                  <button key={i} className={`ph-mchip ${i === month ? "on" : ""}`} onClick={() => { setMonth(i); setPreview(null); }}>
                    {MONTHS_SHORT[i]}
                  </button>
                ))}
              </div>

              <div className="ph-seg">
                <button className={mode === "auto" ? "on" : ""} onClick={() => setMode("auto")}><Icon name="bolt" size={16} /> อัตโนมัติ</button>
                <button className={mode === "manual" ? "on" : ""} onClick={() => setMode("manual")}><Icon name="pen" size={16} /> กรอกเอง</button>
              </div>

              {mode === "auto" ? (
                <>
                  <div className="ph-lump-card">
                    <label>เงินก้อนเดือน {MONTHS[month]}</label>
                    <div className="ph-lump-in">
                      <span>฿</span>
                      <input type="number" placeholder="0" value={lump} onChange={(e) => { setLump(e.target.value); setPreview(null); }} />
                    </div>

                    <div className="ph-boybase">
                      <span className="ph-boybase-l"><span className="ph-boybase-ic"><Icon name="lock" size={14} /></span>ธีรวัฒน์ <em>หักก่อนเฉลี่ย</em></span>
                      <div className="ph-stepper">
                        <button type="button" onClick={() => { setBoyAmt((v) => Math.max(0, (Number(v) || 0) - 1000)); setPreview(null); }} aria-label="ลด"><Icon name="minus" size={16} stroke={2.6} /></button>
                        <input type="number" value={boyAmt} onChange={(e) => { setBoyAmt(Math.max(0, Number(e.target.value) || 0)); setPreview(null); }} />
                        <button type="button" onClick={() => { setBoyAmt((v) => (Number(v) || 0) + 1000); setPreview(null); }} aria-label="เพิ่ม"><Icon name="plus" size={16} stroke={2.6} /></button>
                      </div>
                    </div>
                    {Number(lump) > 0 && (() => {
                      const bg = Math.min(Number(boyAmt) || 0, Number(lump));
                      return <div className="ph-disthint">เฉลี่ยให้คนอื่น <b>฿{fmt(Math.max(0, Number(lump) - bg))}</b> · ธีรวัฒน์ ฿{fmt(bg)}</div>;
                    })()}

                    <button className="ph-calc" onClick={runPreview} disabled={!Number(lump)}>
                      <Icon name="split" size={18} /> คำนวณการกระจาย
                    </button>
                  </div>

                  <div className="ph-tier">
                    <span className="ph-tier-h"><b className="n1">1</b> เติมก่อน</span>
                    <div className="ph-chips">
                      {tier1People.map((p) => (
                        <button key={p.id} className={`ph-chip ${selected[p.id] ? "on" : ""}`}
                          onClick={() => setSelected((s) => ({ ...s, [p.id]: !s[p.id] }))}>
                          {selected[p.id] && <Icon name="check" size={13} stroke={2.6} />}{p.name}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="ph-tier">
                    <span className="ph-tier-h"><b className="n2">2</b> ไว้ทีหลัง</span>
                    <div className="ph-chips">
                      {tier2People.map((p) => (
                        <button key={p.id} className={`ph-chip t2 ${selected[p.id] ? "on" : ""}`}
                          onClick={() => setSelected((s) => ({ ...s, [p.id]: !s[p.id] }))}>
                          {selected[p.id] && <Icon name="check" size={13} stroke={2.6} />}{p.name}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="ph-boy"><Icon name="lock" size={14} /> ธีรวัฒน์ — หักส่วนของตัวเองจากเงินก้อนก่อน แล้วเฉลี่ยที่เหลือให้คนอื่น</div>
                  <div className="ph-boy ph-info"><Icon name="alert" size={14} /> เริ่มกระจาย {MAX_RECIPIENTS} คน/เดือน ตามลำดับความสำคัญ · ถ้าเงินเกินเพดานจะกระจายเพิ่มให้คนถัดไปอัตโนมัติ</div>

                  {preview && (() => {
                    const distSum = preview.ids.reduce((s, id) => s + (preview.alloc[id] || 0), 0);
                    return (
                    <div className="ph-preview">
                      <div className="ph-preview-h">ผลการกระจาย — ทับยอดเดิมเดือน {MONTHS_SHORT[month]}</div>
                      <div className="ph-prow boy">
                        <span className="pr-n"><span className="pr-lock"><Icon name="lock" size={12} /></span> ธีรวัฒน์</span>
                        <span className="pr-a">฿{fmt(preview.boyGet)}</span>
                        <span className="pr-af">ฐานคงที่</span>
                      </div>
                      {preview.ids.map((id) => {
                        const p = people.find((x) => x.id === id);
                        const after = totals[id] - (Number(data[id]?.[month]) || 0) + (preview.alloc[id] || 0);
                        const over = after > p.ceiling + 0.5;
                        const got = preview.alloc[id] || 0;
                        return (
                          <div className={`ph-prow ${got === 0 ? "muted" : ""}`} key={id}>
                            <span className="pr-n">{p.name}</span>
                            <span className="pr-a">฿{fmt(got)}</span>
                            <span className={`pr-af ${over ? "ph-neg" : ""}`}>รวม ฿{fmt(after)}</span>
                          </div>
                        );
                      })}
                      {preview.leftover > 0 && (
                        <div className="ph-leftover"><Icon name="alert" size={15} /> เหลือ ฿{fmt(preview.leftover)} กระจายต่อไม่ได้ (คนที่เลือกเต็มเพดานหมด)</div>
                      )}
                      <div className="ph-preview-sum">
                        เงินก้อน <b>฿{fmt(preview.total)}</b> = ธีรวัฒน์ ฿{fmt(preview.boyGet)} + เฉลี่ยคนอื่น ฿{fmt(distSum)}{preview.leftover > 0 ? ` + เหลือ ฿${fmt(preview.leftover)}` : ""}
                      </div>
                      <div className="ph-preview-act">
                        <button className="ph-ghost" onClick={() => setPreview(null)}>ยกเลิก</button>
                        <button className="ph-calc sm" onClick={applyPreview}><Icon name="check" size={16} /> ยืนยันลงเดือนนี้</button>
                      </div>
                    </div>
                    );
                  })()}
                </>
              ) : (
                <>
                  <div className="ph-msum">รวมเดือน {MONTHS_SHORT[month]} <b>฿{fmt(monthSum)}</b></div>
                  <div className="ph-manual">
                    {people.map((p, i) => {
                      const over = p.tier !== 0 && totals[p.id] > p.ceiling + 0.5;
                      return (
                        <label className={`ph-mrow ${over ? "over" : ""}`} key={p.id}>
                          <span className={`ph-mrow-ic tone-${toneOf(i)}`}>{p.tier === 0 ? <Icon name="lock" size={17} /> : <Icon name="user" size={17} />}</span>
                          <span className="mr-n">{p.name}{over && <em className="mr-warn"><Icon name="alert" size={11} stroke={2.4} /> เกินเพดาน ฿{fmt(totals[p.id] - p.ceiling)}</em>}</span>
                          <span className="mr-in">฿<input type="number" placeholder="0" value={data[p.id]?.[month] || ""} onChange={(e) => setCell(p.id, month, e.target.value)} /></span>
                        </label>
                      );
                    })}
                  </div>
                  <button className="ph-ghost wide" onClick={clearMonth}>ล้างยอดเดือน {MONTHS_SHORT[month]}</button>
                </>
              )}
            </div>
          )}

          {/* ============ TABLE ============ */}
          {page === "table" && (
            <div className="ph-page">
              <div className="ph-table-head">
                <div>
                  <h1 className="ph-title">ภาพรวมทั้งปี</h1>
                  <p className="ph-sub">แตะที่ช่องเพื่อแก้ไขได้ทุกค่า</p>
                </div>
                <button className="ph-export" onClick={exportCSV}><Icon name="down" size={16} stroke={2.1} /> Excel</button>
              </div>
              <div className="ph-table-scroll">
                <table className="ph-table">
                  <thead>
                    <tr><th className="stk">เดือน</th>{people.map((p) => <th key={p.id}>{p.name}</th>)}<th className="sm">รวม</th></tr>
                  </thead>
                  <tbody>
                    {MONTHS.map((m, mi) => {
                      const rs = people.reduce((s, p) => s + (Number(data[p.id]?.[mi]) || 0), 0);
                      return (
                        <tr key={mi} className={mi === month ? "act" : ""}>
                          <td className="stk">{MONTHS_SHORT[mi]}</td>
                          {people.map((p) => (
                            <td key={p.id}><input type="text" inputMode="numeric" placeholder="0" value={data[p.id]?.[mi] ? fmt(data[p.id][mi]) : ""} onChange={(e) => setCell(p.id, mi, e.target.value.replace(/[^\d]/g, ""))} /></td>
                          ))}
                          <td className="sm">{rs ? fmt(rs) : "–"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr><td className="stk">รวมปี</td>{people.map((p) => <td key={p.id} className={`tot st-${statusOf(p.id)}`}>{fmt(totals[p.id])}</td>)}<td className="sm">{fmt(grandTotal)}</td></tr>
                    <tr className="ceil"><td className="stk">เพดาน</td>{people.map((p) => <td key={p.id}>{fmt(p.ceiling)}</td>)}<td className="sm">–</td></tr>
                    <tr className="buf"><td className="stk">คงเหลือ</td>{people.map((p) => { const b = p.ceiling - totals[p.id]; return <td key={p.id} className={b < 0 ? "ph-neg" : "ph-pos"}>{b < 0 ? "-" : ""}{fmt(Math.abs(b))}</td>; })}<td className="sm">–</td></tr>
                    <tr className="wht"><td className="stk"><span className="wht-ic"><Icon name="refund" size={13} stroke={2} /></span> หัก 5%</td>{people.map((p) => <td key={p.id} className="wht-cell">{p.tier === 0 ? "–" : fmt(totals[p.id] * WHT_RATE)}</td>)}<td className="sm">{fmt(totalWHT)}</td></tr>
                  </tfoot>
                </table>
              </div>
            </div>
          )}

          {/* ============ REPORT (คัดลอกส่งบัญชี / ยื่นภาษี) ============ */}
          {page === "report" && (
            <div className="ph-page">
              <h1 className="ph-title">รายงานรายบุคคล</h1>
              <p className="ph-sub">{reportMode === "month" ? "เลือกเดือน แล้วคัดลอกข้อความส่งบัญชีได้เลย" : "คัดลอกข้อมูลแต่ละช่องไปกรอกยื่นภาษีได้เลย"}</p>

              <div className="ph-seg">
                <button className={reportMode === "month" ? "on" : ""} onClick={() => setReportMode("month")}><Icon name="calendar" size={16} /> รายเดือน</button>
                <button className={reportMode === "year" ? "on" : ""} onClick={() => setReportMode("year")}><Icon name="doc" size={16} /> ทั้งปี (ยื่นภาษี)</button>
              </div>

              {reportMode === "month" ? (() => {
                const rep = people
                  .map((p) => ({ id: p.id, name: p.name, amt: Number(data[p.id]?.[month]) || 0 }))
                  .filter((x) => x.amt > 0)
                  .map((x) => ({ id: x.id, name: x.name, line: `${x.name} เดือน ${MONTHS[month]} ${fmt2(x.amt)} บาท` }));
                const allText = rep.map((r) => r.line).join("\n");
                return (
                  <>
                    <div className="ph-month-strip">
                      {MONTHS.map((m, i) => (
                        <button key={i} className={`ph-mchip ${i === month ? "on" : ""}`} onClick={() => setMonth(i)}>{MONTHS_SHORT[i]}</button>
                      ))}
                    </div>
                    <button className="ph-calc" onClick={() => copyText("all", allText)} disabled={!rep.length}>
                      <Icon name="copy" size={18} /> {copied === "all" ? "คัดลอกทั้งหมดแล้ว ✓" : "คัดลอกทั้งหมด"}
                    </button>
                    {rep.length === 0 ? (
                      <div className="ph-rep-empty"><Icon name="doc" size={30} stroke={1.6} /><span>ยังไม่มียอดในเดือนนี้</span></div>
                    ) : (
                      <div className="ph-rep">
                        {rep.map((r) => (
                          <div className="ph-rep-card" key={r.id}>
                            <div className="ph-rep-text">{r.line}</div>
                            <button className={`ph-rep-copy ${copied === r.id ? "done" : ""}`} onClick={() => copyText(r.id, r.line)}>
                              <Icon name={copied === r.id ? "check" : "copy"} size={15} stroke={copied === r.id ? 2.6 : 1.9} /> {copied === r.id ? "แล้ว" : "คัดลอก"}
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                );
              })() : (
                <div className="ph-taxcards">
                  <div className="ph-taxsum">
                    <div><span>ยอดรวมทุกคน</span><strong>฿{fmt2(grandTotal)}</strong></div>
                    <div className="div" />
                    <div><span>หัก ณ ที่จ่าย 5% รวม</span><strong className="mint">฿{fmt2(totalWHT)}</strong></div>
                  </div>
                  {people.map((p, idx) => {
                    const total = totals[p.id];
                    const wht = p.tier === 0 ? 0 : total * WHT_RATE;
                    const allText = [
                      p.name,
                      "ผู้จ่ายเงินได้: " + PAYER_TAXID,
                      "ID: " + p.nid,
                      "P: " + p.pcode,
                      "B: " + p.bcode,
                      `ยอดรวมทั้งปี: ${fmt2(total)} บาท (${monthsOf(p.id)} เดือน)`,
                      p.tier === 0 ? "หัก ณ ที่จ่าย 5%: ยกเว้น" : `หัก ณ ที่จ่าย 5%: ${fmt2(wht)} บาท`,
                    ].join("\n");
                    const ck = (key) => copied === key;
                    const copyBtn = (key, val) => (
                      <button className={`ph-tf-copy ${ck(key) ? "done" : ""}`} onClick={() => copyText(key, val)} aria-label="คัดลอก">
                        <Icon name={ck(key) ? "check" : "copy"} size={14} stroke={ck(key) ? 2.6 : 1.9} />{ck(key) ? " แล้ว" : ""}
                      </button>
                    );
                    const field = (key, label, value, copyVal, mono) => (
                      <div className="ph-tf" key={key}>
                        <div className="ph-tf-l">
                          <span className="ph-tf-lbl">{label}</span>
                          <span className={`ph-tf-val ${mono ? "mono" : ""}`}>{value}</span>
                        </div>
                        {copyBtn(key, copyVal)}
                      </div>
                    );
                    return (
                      <div className="ph-taxcard" key={p.id}>
                        <div className={`ph-taxhead tone-${toneOf(idx)}`}>
                          <span className="ph-taxic">{p.tier === 0 ? <Icon name="lock" size={16} /> : <Icon name="user" size={16} />}</span>
                          <span className="ph-taxname">{p.name}</span>
                          {copyBtn(p.id + "-name", p.name)}
                        </div>
                        <div className="ph-taxbody">
                          {field(p.id + "-payer", "ผู้จ่ายเงินได้ (เลขผู้เสียภาษีบริษัท)", PAYER_TAXID, PAYER_TAXID, true)}
                          {field(p.id + "-nid", "เลขบัตรประชาชน (ID)", p.nid, p.nid, true)}
                          {field(p.id + "-p", "รหัส P", p.pcode, p.pcode, true)}
                          {field(p.id + "-b", "รหัส B", p.bcode, p.bcode, true)}
                          {field(p.id + "-total", `ยอดรวมทั้งปี (${monthsOf(p.id)} เดือน)`, "฿ " + fmt2(total), fmt2(total))}
                          {p.tier === 0 ? (
                            <div className="ph-tf muted"><div className="ph-tf-l"><span className="ph-tf-lbl">หัก ณ ที่จ่าย 5%</span><span className="ph-tf-val">ยกเว้น</span></div></div>
                          ) : (
                            field(p.id + "-wht", "หัก ณ ที่จ่าย 5%", "฿ " + fmt2(wht), fmt2(wht))
                          )}
                          <button className={`ph-taxall ${ck(p.id + "-all") ? "done" : ""}`} onClick={() => copyText(p.id + "-all", allText)}>
                            <Icon name={ck(p.id + "-all") ? "check" : "copy"} size={15} stroke={ck(p.id + "-all") ? 2.6 : 1.9} /> {ck(p.id + "-all") ? "คัดลอกทั้งชุดแล้ว ✓" : "คัดลอกทั้งชุด"}
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              <p className="ph-note">{reportMode === "month"
                ? "รูปแบบข้อความ: ชื่อ เดือน <เดือน> <จำนวนเงิน> บาท · แตะ \"คัดลอก\" รายคน หรือ \"คัดลอกทั้งหมด\" แล้ววางส่งบัญชีได้ทันที"
                : "แตะปุ่มคัดลอกข้างแต่ละช่อง (ชื่อ / ID / P / B / ยอดรวม / หัก 5%) เพื่อนำไปกรอกยื่นภาษีทีละช่อง"}</p>
            </div>
          )}
        </div>

        {/* bottom nav */}
        <nav className="ph-nav">
          <button className={page === "home" ? "on" : ""} onClick={() => setPage("home")}><Icon name="home" size={21} /><span>หน้าหลัก</span></button>
          <button className={page === "table" ? "on" : ""} onClick={() => setPage("table")}><Icon name="grid" size={21} /><span>ตาราง</span></button>
          <button className={page === "distribute" ? "on" : ""} onClick={() => setPage("distribute")}><Icon name="split" size={21} /><span>กระจายเงิน</span></button>
          <button className={page === "report" ? "on" : ""} onClick={() => setPage("report")}><Icon name="copy" size={21} /><span>รายงาน</span></button>
        </nav>

        {/* Google Sheet sync modal */}
        {showSync && (
          <div className="ph-modal" onClick={(e) => { if (e.target.classList.contains("ph-modal")) setShowSync(false); }}>
            <div className="ph-modal-card">
              <div className="ph-modal-h">
                <h3><Icon name="cloud" size={19} stroke={2} /> เชื่อม Google Sheet</h3>
                <button className="ph-modal-x" onClick={() => setShowSync(false)} aria-label="ปิด"><Icon name="x" size={18} stroke={2.2} /></button>
              </div>
              <p className="ph-modal-sub">เชื่อมครั้งเดียว · ซิงก์อัตโนมัติแบบเรียลไทม์ · ใช้ได้หลายเครื่อง</p>
              <label className="ph-sync-label">ลิงก์ Google Apps Script Web App</label>
              <input className="ph-sync-in" type="url" placeholder="https://script.google.com/macros/s/.../exec"
                value={endpoint} onChange={(e) => setEndpoint(e.target.value)} />
              <div className={`ph-sync-status ${endpoint ? "on" : ""}`}>
                <span className={`ph-syncdot ${endpoint ? "live" : "off"}`} /> {syncStatus}
              </div>
              <div className="ph-sync-act">
                <button className="ph-ghost" onClick={() => cloudPull(true)}><Icon name="down" size={16} /> โหลดตอนนี้</button>
                <button className="ph-calc sm" onClick={() => cloudPush(hashState(people, data))}><Icon name="up" size={16} /> บันทึกตอนนี้</button>
              </div>
              {endpoint ? (
                <button className="ph-disconnect" onClick={() => { setEndpoint(""); setSyncStatus("ยกเลิกการเชื่อมแล้ว"); }}>ยกเลิกการเชื่อม</button>
              ) : null}
              <p className="ph-modal-note">เมื่อใส่ลิงก์แล้ว แอปจะบันทึกขึ้นชีตอัตโนมัติทุกครั้งที่แก้ และดึงอัปเดตจากเครื่องอื่นเองทุก ~12 วินาที · โค้ดติดตั้งอยู่ในไฟล์ GoogleAppsScript-Code.gs</p>
              <button className="ph-modal-reset" onClick={resetAll}><Icon name="refresh" size={14} /> ล้างข้อมูลทั้งหมด (กลับค่าเริ่มต้น)</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap');

.ph-bg{
  --paper:#ffffff; --paper2:#fdf7f4;
  --ink:#3a2f37; --ink2:#6b5e66; --mut:#a99ba3;
  --line:#f0e3e6; --line2:#f6edef;

  --pink:#f85b8b; --pink-d:#e23e72; --pink-soft:#ffe1ec;
  --peach-bg:#ffe6d8; --peach-ink:#d9663b;
  --mint-bg:#d9f1e6; --mint-ink:#2f9e74;
  --lilac-bg:#ece2f8; --lilac-ink:#8a63c4;
  --butter-bg:#fdeecb; --butter-ink:#c79321;
  --sky-bg:#dcecfb; --sky-ink:#3a82c9;
  --rose-bg:#ffe1ea; --rose-ink:#d8527e;

  --ok:#2f9e74; --okbg:#e2f3ea;
  --warn:#c79321; --warnbg:#fbf0d3;
  --over:#df5a5a; --overbg:#fde0e0;

  background:
    radial-gradient(1000px 540px at 84% -12%, #ffe4ee, transparent),
    radial-gradient(760px 620px at -14% 102%, #fdeede, transparent),
    radial-gradient(560px 380px at 50% 60%, #fdf4f6, transparent),
    #fbf2f0;
  min-height:100vh; display:flex; justify-content:center;
  padding:18px; font-family:'Noto Sans Thai',sans-serif;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; color:var(--ink);
}
.ph-bg *{box-sizing:border-box;}
.ph-shell{
  width:100%; max-width:430px; background:linear-gradient(180deg,#fffaf8,#fdf3f1);
  border-radius:44px; overflow:hidden; position:relative;
  box-shadow:
    0 40px 90px -28px rgba(180,80,110,.42),
    0 14px 30px -20px rgba(180,80,110,.3),
    0 0 0 1px rgba(220,150,170,.1),
    inset 0 0 0 7px var(--paper);
  display:flex; flex-direction:column; min-height:760px; max-height:90vh;
}
.ph-center{align-items:center;justify-content:center;gap:14px;}
.ph-spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--pink);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ph-load-t{color:var(--mut);font-size:13px;}

.ph-status{display:flex;justify-content:space-between;align-items:center;padding:15px 26px 4px;font-size:12px;font-weight:700;color:var(--ink2);flex-shrink:0;}
.ph-status-r{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--mut);font-weight:600;}
.ph-dot{width:4px;height:4px;border-radius:50%;background:var(--mut);display:inline-block;opacity:.65;}

.ph-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:18px 18px 104px;}
.ph-scroll::-webkit-scrollbar{width:0;}
.ph-page{animation:pageIn .42s cubic-bezier(.22,.7,.3,1);}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.ph-title{font-size:25px;font-weight:800;margin:10px 4px 3px;letter-spacing:-.01em;}
.ph-sub{color:var(--mut);font-size:12.5px;margin:0 4px 16px;font-weight:500;}

/* hero */
.ph-hero{position:relative;background:linear-gradient(150deg,#ff85a9,#f85b8b 55%,#ef4f86);color:#fff;border-radius:30px;padding:18px 22px 22px;margin:8px 0 16px;overflow:hidden;box-shadow:0 20px 40px -16px rgba(230,62,114,.6),inset 0 1px 0 rgba(255,255,255,.22);}
.ph-hero-deco{position:absolute;right:-50px;top:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 42% 42%, rgba(255,255,255,.24), transparent 68%);}
.ph-hero-deco::after{content:"";position:absolute;left:-70px;bottom:-150px;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.12), transparent 70%);}
.ph-hero-top{position:relative;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.ph-hero-chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:30px;background:rgba(255,255,255,.2);backdrop-filter:blur(4px);box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);}
.ph-hero-label{position:relative;font-size:11.5px;letter-spacing:.04em;opacity:.92;font-weight:600;}
.ph-hero-amt{position:relative;font-size:42px;font-weight:800;line-height:1.04;margin:4px 0 6px;letter-spacing:-.025em;text-shadow:0 2px 10px rgba(150,30,70,.28);}
.ph-hero-sub{position:relative;font-size:12.5px;font-weight:600;opacity:.94;}

/* quick cards */
.ph-quick{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px;}
.ph-qcard{display:flex;align-items:center;gap:12px;border-radius:22px;padding:14px 15px;box-shadow:0 6px 16px -10px rgba(120,80,90,.3),inset 0 1px 0 rgba(255,255,255,.6);}
.ph-qcard h3{margin:0;font-size:12px;font-weight:600;color:var(--ink2);letter-spacing:.005em;}
.ph-qcard strong{display:block;font-size:18px;font-weight:800;margin-top:2px;letter-spacing:-.01em;}
.ph-qic{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.7);flex-shrink:0;box-shadow:0 3px 8px -4px rgba(120,80,90,.3);}
.ph-qcard.peach{background:var(--peach-bg);} .ph-qcard.peach .ph-qic,.ph-qcard.peach strong{color:var(--peach-ink);}
.ph-qcard.mint{background:var(--mint-bg);} .ph-qcard.mint .ph-qic,.ph-qcard.mint strong{color:var(--mint-ink);}
.ph-qcard.lilac{background:var(--lilac-bg);} .ph-qcard.lilac .ph-qic,.ph-qcard.lilac strong{color:var(--lilac-ink);}
.ph-qcard.butter{background:var(--butter-bg);} .ph-qcard.butter .ph-qic,.ph-qcard.butter strong{color:var(--butter-ink);}

/* panel */
.ph-panel{background:var(--paper);border:1px solid var(--line);border-radius:26px;padding:17px 17px 18px;margin-bottom:16px;box-shadow:0 8px 22px -14px rgba(150,90,110,.28);}
.ph-panel-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.ph-panel-h h2{display:flex;align-items:center;gap:7px;font-size:15.5px;font-weight:800;margin:0;letter-spacing:-.005em;color:var(--ink);}
.ph-panel-h h2 svg{color:var(--pink);}
.ph-link{background:none;border:none;color:var(--pink-d);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;padding:4px 2px;}
.ph-link:active{opacity:.6;}

/* bar chart */
.ph-bars{display:flex;align-items:flex-end;gap:5px;height:150px;padding-top:6px;}
.ph-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;background:none;border:none;cursor:pointer;padding:0;font-family:inherit;}
.ph-bar-v{font-size:8.5px;font-weight:700;color:var(--mut);height:11px;white-space:nowrap;}
.ph-bar-track{flex:1;width:100%;max-width:18px;display:flex;align-items:flex-end;background:var(--line2);border-radius:8px;overflow:hidden;}
.ph-bar-fill{width:100%;border-radius:8px;background:linear-gradient(180deg,#ffa9c2,#f85b8b);transition:height .6s cubic-bezier(.3,.85,.35,1);min-height:3px;}
.ph-bar-col.on .ph-bar-fill{background:linear-gradient(180deg,#7ed3b0,#2f9e74);}
.ph-bar-col.on .ph-bar-m{color:var(--mint-ink);font-weight:800;}
.ph-bar-col.on .ph-bar-v{color:var(--mint-ink);}
.ph-bar-m{font-size:9px;font-weight:600;color:var(--mut);}
.ph-bar-col:active .ph-bar-fill{filter:brightness(.95);}

/* people cards */
.ph-people{display:flex;flex-direction:column;gap:10px;}
.ph-pcard{display:flex;gap:12px;align-items:center;background:var(--paper2);border:1px solid var(--line);border-radius:20px;padding:13px 14px;box-shadow:0 3px 10px -7px rgba(150,90,110,.25);animation:cardIn .46s both cubic-bezier(.22,.7,.3,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.ph-pcard.st-warn{border-color:#f0dca8;}
.ph-pcard.st-over{border-color:#f4c2c2;}
.ph-avatar{width:42px;height:42px;border-radius:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(120,80,90,.06);}
.ph-avatar.tone-peach{background:var(--peach-bg);color:var(--peach-ink);}
.ph-avatar.tone-mint{background:var(--mint-bg);color:var(--mint-ink);}
.ph-avatar.tone-lilac{background:var(--lilac-bg);color:var(--lilac-ink);}
.ph-avatar.tone-butter{background:var(--butter-bg);color:var(--butter-ink);}
.ph-avatar.tone-sky{background:var(--sky-bg);color:var(--sky-ink);}
.ph-avatar.tone-rose{background:var(--rose-bg);color:var(--rose-ink);}
.ph-pcard-m{flex:1;min-width:0;}
.ph-pcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.ph-pname{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;}
.ph-tag{font-style:normal;font-size:9.5px;font-weight:700;color:var(--lilac-ink);background:var(--lilac-bg);padding:2px 8px;border-radius:20px;}
.ph-pamt{font-size:16px;font-weight:800;letter-spacing:-.01em;}
.ph-track{height:8px;background:var(--line2);border-radius:8px;overflow:hidden;margin-bottom:8px;}
.ph-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#7ed3b0,var(--ok));transition:width .6s cubic-bezier(.3,.85,.35,1);}
.ph-fill.st-warn{background:linear-gradient(90deg,#e9c469,var(--warn));}
.ph-fill.st-over{background:linear-gradient(90deg,#f08a8a,var(--over));}
.ph-fill.boyover{background:linear-gradient(90deg,#7bb6ec,var(--sky-ink));}
.ph-avatar.boyover{background:var(--sky-bg)!important;color:var(--sky-ink)!important;}
.ph-tag.info{color:var(--sky-ink);background:var(--sky-bg);}
.ph-info-text{color:var(--sky-ink);font-weight:700;}
.ph-pcard-bot{display:flex;justify-content:space-between;align-items:center;font-size:12px;}
.ph-mut{color:var(--mut);font-weight:500;}
.ph-pos{color:var(--ok);font-weight:700;}
.ph-neg{color:var(--over);font-weight:700;}
.ph-ceil-edit{color:var(--mut);display:flex;align-items:center;gap:2px;font-weight:500;}
.ph-ceil-edit input{width:78px;padding:4px 8px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:12px;background:var(--paper);transition:.15s;}
.ph-ceil-edit input:focus{outline:none;border-color:var(--pink);}
.ph-name-edit{flex:1;min-width:0;padding:5px 9px;border:1px solid var(--pink);border-radius:10px;font-family:inherit;font-size:13.5px;font-weight:700;background:var(--pink-soft);color:var(--ink);}
.ph-name-edit:focus{outline:none;background:#fff;}

/* reorder (จัดลำดับความสำคัญ) */
.ph-reorder{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;padding-left:4px;}
.ph-reorder button{width:30px;height:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--paper);color:var(--pink-d);border-radius:9px;cursor:pointer;transition:.15s;}
.ph-reorder button:active{transform:scale(.9);background:var(--pink-soft);}
.ph-reorder button:disabled{opacity:.3;cursor:default;}
.ph-rank{font-size:11px;font-weight:800;color:var(--mut);line-height:1;}

/* หัก ณ ที่จ่าย 5% — สรุปหน้าหลัก */
.ph-wht-strip{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--mint-bg),#cdeede);border:1px solid #bce4d0;border-radius:22px;padding:14px 16px;margin-bottom:18px;box-shadow:0 6px 16px -10px rgba(47,158,116,.35),inset 0 1px 0 rgba(255,255,255,.6);}
.ph-wht-ic{width:42px;height:42px;border-radius:15px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.75);color:var(--mint-ink);flex-shrink:0;box-shadow:0 3px 8px -4px rgba(47,158,116,.35);}
.ph-wht-info{flex:1;min-width:0;}
.ph-wht-info b{display:block;font-size:13.5px;font-weight:800;color:#1f7d5a;}
.ph-wht-info small{display:block;font-size:11px;color:var(--mint-ink);font-weight:600;margin-top:1px;opacity:.85;}
.ph-wht-amt{font-size:21px;font-weight:800;color:#1f7d5a;letter-spacing:-.01em;}
.ph-info{color:var(--warn)!important;}

/* sync panel */
.ph-sync-label{display:block;font-size:11.5px;color:var(--mut);font-weight:700;margin-bottom:7px;}
.ph-sync-in{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:14px;font-family:inherit;font-size:12.5px;background:var(--paper2);color:var(--ink);transition:.15s;}
.ph-sync-in:focus{outline:none;border-color:var(--pink);background:var(--paper);}
.ph-sync-status{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--ink2);background:var(--paper2);border:1px solid var(--line2);border-radius:12px;padding:9px 12px;margin:11px 0 12px;line-height:1.45;}
.ph-sync-status.busy{color:var(--pink-d);}
.ph-sync-act{display:flex;gap:9px;}
.ph-sync-act .ph-ghost{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.ph-sync-act .ph-calc.sm{flex:1;}
.ph-calc:disabled,.ph-ghost:disabled{opacity:.45;cursor:default;}
.ph-syncdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ph-syncdot.live{background:var(--ok);box-shadow:0 0 0 3px rgba(47,158,116,.18);animation:pulse 1.8s ease-in-out infinite;}
.ph-syncdot.off{background:var(--mut);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* hero actions: ปุ่มเมฆเล็ก */
.ph-hero-actions{display:flex;align-items:center;gap:8px;}
.ph-hero-icon{position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#fff;background:rgba(255,255,255,.18);border:none;border-radius:30px;cursor:pointer;transition:.18s;box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);}
.ph-hero-icon:active{transform:scale(.92);background:rgba(255,255,255,.28);}
.ph-hero-icon .ph-syncdot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:#8ff0c4;box-shadow:0 0 0 2px rgba(248,91,139,.4);}

/* sync modal */
.ph-modal{position:absolute;inset:0;z-index:50;background:rgba(60,30,45,.32);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;padding:0 0 calc(70px + env(safe-area-inset-bottom));}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ph-modal-card{width:100%;max-width:430px;background:var(--paper);border-radius:28px 28px 0 0;padding:20px 20px 24px;box-shadow:0 -16px 40px -16px rgba(80,40,60,.4);animation:sheetUp .32s cubic-bezier(.22,.8,.3,1);}
@keyframes sheetUp{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.ph-modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.ph-modal-h h3{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800;margin:0;color:var(--ink);}
.ph-modal-h h3 svg{color:var(--pink);}
.ph-modal-x{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:var(--paper2);color:var(--mut);border-radius:11px;cursor:pointer;}
.ph-modal-x:active{transform:scale(.9);}
.ph-modal-sub{font-size:12px;color:var(--mut);font-weight:600;margin:0 0 16px;}
.ph-disconnect{width:100%;margin-top:11px;padding:11px;background:none;border:1px solid var(--line);border-radius:13px;color:var(--over);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;}
.ph-disconnect:active{background:var(--overbg);}
.ph-modal-note{font-size:10.5px;color:var(--mut);line-height:1.6;margin:14px 0 0;font-weight:500;}
.ph-modal-reset{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:14px;padding:12px;background:none;border:1px solid var(--overbg);border-radius:14px;color:var(--over);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;transition:.16s;}
.ph-modal-reset:active{background:var(--overbg);transform:scale(.99);}

/* month count ใต้ชื่อ */
.ph-pname-col{display:flex;flex-direction:column;gap:1px;min-width:0;}
.ph-pmonths{font-size:10.5px;font-weight:600;color:var(--mut);}

.ph-reset{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin:6px 0 4px;padding:13px;background:var(--paper);border:1px solid var(--line);border-radius:16px;color:var(--mut);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.18s;}
.ph-reset:active{background:var(--paper2);transform:scale(.99);}
.ph-note{font-size:11px;color:var(--mut);line-height:1.65;margin:14px 4px 0;font-weight:500;}

/* month grid — 2 แถว (1-6 บน / 7-12 ล่าง) */
.ph-month-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;padding:6px 0 14px;}
.ph-mchip{padding:10px 4px;border-radius:16px;border:1px solid var(--line);background:var(--paper);color:var(--ink2);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.2s cubic-bezier(.22,.7,.3,1);text-align:center;}
.ph-mchip:active{transform:scale(.95);}
.ph-mchip.on{background:linear-gradient(150deg,#ff85a9,var(--pink-d));color:#fff;border-color:transparent;box-shadow:0 8px 16px -6px rgba(230,62,114,.55),inset 0 1px 0 rgba(255,255,255,.22);}

.ph-seg{display:flex;background:var(--paper2);border:1px solid var(--line);border-radius:18px;padding:4px;gap:4px;margin-bottom:18px;box-shadow:inset 0 1px 3px rgba(150,90,110,.07);}
.ph-seg button{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px;border:none;background:none;border-radius:14px;color:var(--mut);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:.2s ease;}
.ph-seg button.on{background:var(--paper);color:var(--pink-d);box-shadow:0 4px 11px -5px rgba(150,90,110,.34);}

.ph-lump-card{background:var(--paper);border:1px solid var(--line);border-radius:26px;padding:20px;margin-bottom:18px;box-shadow:0 8px 22px -14px rgba(150,90,110,.3);}
.ph-lump-card label{font-size:12.5px;color:var(--mut);font-weight:700;}
.ph-lump-in{display:flex;align-items:center;gap:7px;margin:9px 0 17px;border-bottom:2px solid var(--line);padding-bottom:9px;transition:border-color .2s;}
.ph-lump-in:focus-within{border-bottom-color:var(--pink);}
.ph-lump-in span{font-size:27px;font-weight:700;color:var(--mut);}
.ph-lump-in input{flex:1;border:none;background:none;font-size:33px;font-weight:800;color:var(--ink);width:100%;letter-spacing:-.01em;}
.ph-lump-in input:focus{outline:none;}
.ph-calc{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;background:linear-gradient(150deg,#ff85a9,var(--pink-d));color:#fff;border:none;border-radius:16px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;transition:.18s ease;box-shadow:0 10px 20px -8px rgba(230,62,114,.55),inset 0 1px 0 rgba(255,255,255,.24);}
.ph-calc:active{transform:scale(.982);}
.ph-calc:disabled{opacity:.4;box-shadow:none;cursor:default;}
.ph-calc.sm{padding:13px 16px;width:auto;flex:1;}

/* ช่องธีรวัฒน์ (หักก่อนเฉลี่ย) + stepper */
.ph-boybase{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--paper2);border:1px solid var(--line);border-radius:15px;padding:9px 11px;margin-bottom:11px;}
.ph-boybase-l{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--ink);}
.ph-boybase-l em{font-style:normal;font-size:10px;font-weight:700;color:var(--mut);background:var(--cream2,#eee);background:#f0e3e6;padding:2px 7px;border-radius:20px;}
.ph-boybase-ic{width:26px;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--lilac-bg);color:var(--lilac-ink);flex-shrink:0;}
.ph-stepper{display:flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:3px;}
.ph-stepper button{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:var(--pink-soft);color:var(--pink-d);border-radius:9px;cursor:pointer;transition:.15s;}
.ph-stepper button:active{transform:scale(.9);background:#ffd1e0;}
.ph-stepper input{width:74px;border:none;background:none;text-align:center;font-family:inherit;font-size:15px;font-weight:800;color:var(--ink);}
.ph-stepper input:focus{outline:none;}
.ph-disthint{font-size:12px;font-weight:600;color:var(--mut);background:var(--mint-bg);border-radius:11px;padding:8px 11px;margin-bottom:13px;}
.ph-disthint b{color:var(--mint-ink);font-weight:800;}

.ph-tier{margin-bottom:15px;}
.ph-tier-h{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ink2);margin-bottom:10px;}
.ph-tier-h b{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;box-shadow:0 3px 7px -3px rgba(150,90,110,.5);}
.ph-tier-h b.n1{background:linear-gradient(150deg,#ff85a9,var(--pink-d));}
.ph-tier-h b.n2{background:linear-gradient(150deg,#c4a8e6,var(--lilac-ink));}
.ph-chips{display:flex;flex-wrap:wrap;gap:8px;}
.ph-chip{display:inline-flex;align-items:center;gap:5px;padding:9px 15px;border-radius:30px;border:1px solid var(--line);background:var(--paper);color:var(--mut);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;transition:.18s cubic-bezier(.22,.7,.3,1);}
.ph-chip:active{transform:scale(.95);}
.ph-chip.on{background:var(--pink-soft);border-color:var(--pink);color:var(--pink-d);box-shadow:0 4px 10px -5px rgba(230,62,114,.4);}
.ph-chip.t2.on{background:var(--lilac-bg);border-color:#bfa3e3;color:var(--lilac-ink);box-shadow:0 4px 10px -5px rgba(138,99,196,.35);}
.ph-boy{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink2);background:var(--paper2);border:1px dashed var(--line);border-radius:16px;padding:12px 15px;margin-top:6px;line-height:1.4;font-weight:500;}

.ph-preview{margin-top:18px;background:var(--paper);border:1px solid var(--line);border-radius:26px;padding:18px 20px;box-shadow:0 10px 26px -14px rgba(150,90,110,.36);animation:pageIn .34s ease;}
.ph-preview-h{font-size:12px;font-weight:700;color:var(--mut);margin-bottom:13px;}
.ph-prow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line2);}
.ph-prow:last-of-type{border-bottom:none;}
.ph-prow.muted{opacity:.42;}
.pr-n{flex:1;font-size:13.5px;font-weight:600;}
.pr-a{font-size:16px;font-weight:800;color:var(--pink-d);letter-spacing:-.01em;}
.pr-af{font-size:11px;color:var(--mut);min-width:96px;text-align:right;font-weight:600;}
.ph-prow.boy{background:var(--lilac-bg);border:none;border-radius:12px;padding:9px 11px;margin-bottom:4px;}
.ph-prow.boy .pr-n{color:var(--lilac-ink);font-weight:700;display:flex;align-items:center;gap:6px;}
.ph-prow.boy .pr-lock{display:inline-flex;}
.ph-prow.boy .pr-a{color:var(--lilac-ink);}
.ph-prow.boy .pr-af{color:var(--lilac-ink);opacity:.8;}
.ph-preview-sum{font-size:11.5px;font-weight:600;color:var(--ink2);background:var(--paper2);border:1px dashed var(--line);border-radius:12px;padding:10px 12px;margin-top:13px;line-height:1.5;}
.ph-preview-sum b{color:var(--pink-d);font-weight:800;}
.ph-leftover{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--warn);background:var(--warnbg);border-radius:14px;padding:12px 14px;margin-top:13px;line-height:1.45;font-weight:600;}
.ph-preview-act{display:flex;gap:9px;margin-top:15px;}
.ph-ghost{padding:13px 18px;background:var(--paper);border:1px solid var(--line);border-radius:15px;color:var(--mut);font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:.18s ease;}
.ph-ghost:active{transform:scale(.98);background:var(--paper2);}
.ph-ghost.wide{width:100%;margin-top:14px;}

.ph-msum{font-size:13px;color:var(--mut);margin-bottom:13px;font-weight:600;}
.ph-msum b{font-size:18px;font-weight:800;color:var(--pink-d);margin-left:6px;letter-spacing:-.01em;}
.ph-manual{display:flex;flex-direction:column;gap:9px;}
.ph-mrow{display:flex;align-items:center;gap:11px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:11px 14px;box-shadow:0 3px 10px -8px rgba(150,90,110,.22);transition:border-color .15s;}
.ph-mrow:focus-within{border-color:var(--pink);}
.ph-mrow.over{border-color:var(--over);background:linear-gradient(180deg,#fff,var(--overbg));}
.mr-warn{display:inline-flex;align-items:center;gap:3px;font-style:normal;font-size:10px;font-weight:700;color:var(--over);margin-left:8px;}
.ph-mrow-ic{width:42px;height:42px;border-radius:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(120,80,90,.06);}
.ph-mrow-ic.tone-peach{background:var(--peach-bg);color:var(--peach-ink);}
.ph-mrow-ic.tone-mint{background:var(--mint-bg);color:var(--mint-ink);}
.ph-mrow-ic.tone-lilac{background:var(--lilac-bg);color:var(--lilac-ink);}
.ph-mrow-ic.tone-butter{background:var(--butter-bg);color:var(--butter-ink);}
.ph-mrow-ic.tone-sky{background:var(--sky-bg);color:var(--sky-ink);}
.ph-mrow-ic.tone-rose{background:var(--rose-bg);color:var(--rose-ink);}
.mr-n{flex:1;font-size:14px;font-weight:600;}
.mr-in{display:flex;align-items:center;gap:4px;color:var(--mut);font-size:14px;font-weight:600;}
.mr-in input{width:98px;padding:8px 11px;border:1px solid var(--line);border-radius:11px;font-size:15px;font-weight:700;text-align:right;background:var(--paper2);color:var(--ink);transition:.15s;}
.mr-in input:focus{outline:none;border-color:var(--pink);background:var(--paper);}

/* report (คัดลอกส่งบัญชี) */
.ph-rep{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.ph-rep-card{display:flex;align-items:center;gap:11px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:13px 14px;box-shadow:0 4px 12px -8px rgba(150,90,110,.24);}
.ph-rep-text{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.65;word-break:break-word;}
.ph-rep-copy{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;background:var(--pink-soft);border:1px solid var(--pink);color:var(--pink-d);font-family:inherit;font-size:12px;font-weight:700;padding:9px 13px;border-radius:13px;cursor:pointer;transition:.16s cubic-bezier(.22,.7,.3,1);}
.ph-rep-copy:active{transform:scale(.94);}
.ph-rep-copy.done{background:var(--mint-bg);border-color:#7fcfa9;color:var(--mint-ink);}
.ph-rep-empty{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--mut);font-size:13px;font-weight:600;padding:40px 0;margin-top:14px;}
.ph-rep-empty svg{opacity:.5;}
.ph-page .ph-calc{margin-top:4px;}

/* tax-filing cards (หน้าทั้งปี) */
.ph-taxcards{display:flex;flex-direction:column;gap:13px;margin-top:14px;}
.ph-taxsum{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--lilac-bg),#e6dcf6);border:1px solid #ddccf2;border-radius:20px;padding:14px 18px;box-shadow:0 6px 16px -10px rgba(138,99,196,.3);}
.ph-taxsum > div{flex:1;display:flex;flex-direction:column;gap:2px;}
.ph-taxsum .div{flex:0 0 1px;align-self:stretch;background:#ddccf2;}
.ph-taxsum span{font-size:11px;font-weight:600;color:var(--ink2);}
.ph-taxsum strong{font-size:18px;font-weight:800;color:var(--lilac-ink);letter-spacing:-.01em;}
.ph-taxsum strong.mint{color:#1f7d5a;}
.ph-taxall{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;padding:11px;background:var(--accent-soft,#eee);background:var(--lilac-bg);border:1px solid #cbb6ec;border-radius:13px;color:var(--lilac-ink);font-family:inherit;font-size:12.5px;font-weight:800;cursor:pointer;transition:.16s;}
.ph-taxall:active{transform:scale(.97);}
.ph-taxall.done{background:var(--mint-bg);border-color:#7fcfa9;color:var(--mint-ink);}
.ph-taxcard{background:var(--paper);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 6px 18px -12px rgba(150,90,110,.28);}
.ph-taxhead{display:flex;align-items:center;gap:10px;padding:13px 15px;}
.ph-taxhead.tone-peach{background:var(--peach-bg);} .ph-taxhead.tone-mint{background:var(--mint-bg);} .ph-taxhead.tone-lilac{background:var(--lilac-bg);} .ph-taxhead.tone-butter{background:var(--butter-bg);} .ph-taxhead.tone-sky{background:var(--sky-bg);} .ph-taxhead.tone-rose{background:var(--rose-bg);}
.ph-taxic{width:32px;height:32px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.75);color:var(--ink2);flex-shrink:0;}
.ph-taxhead.tone-peach .ph-taxic{color:var(--peach-ink);} .ph-taxhead.tone-mint .ph-taxic{color:var(--mint-ink);} .ph-taxhead.tone-lilac .ph-taxic{color:var(--lilac-ink);} .ph-taxhead.tone-butter .ph-taxic{color:var(--butter-ink);} .ph-taxhead.tone-sky .ph-taxic{color:var(--sky-ink);} .ph-taxhead.tone-rose .ph-taxic{color:var(--rose-ink);}
.ph-taxname{flex:1;min-width:0;font-size:14.5px;font-weight:800;color:var(--ink);}
.ph-taxbody{padding:5px 15px 10px;}
.ph-tf{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line2);}
.ph-tf:last-child{border-bottom:none;}
.ph-tf.muted{opacity:.6;}
.ph-tf-l{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.ph-tf-lbl{font-size:10.5px;font-weight:600;color:var(--mut);letter-spacing:.01em;}
.ph-tf-val{font-size:14px;font-weight:700;color:var(--ink);word-break:break-word;}
.ph-tf-val.mono{font-variant-numeric:tabular-nums;letter-spacing:.02em;}
.ph-tf-copy{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;background:var(--pink-soft);border:1px solid var(--pink);color:var(--pink-d);font-family:inherit;font-size:11.5px;font-weight:700;padding:7px 11px;border-radius:11px;cursor:pointer;transition:.16s cubic-bezier(.22,.7,.3,1);}
.ph-tf-copy:active{transform:scale(.92);}
.ph-tf-copy.done{background:var(--mint-bg);border-color:#7fcfa9;color:var(--mint-ink);}

/* table */
.ph-table-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.ph-export{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;margin-top:12px;padding:9px 15px;background:var(--mint-bg);border:1px solid #bce4d0;color:#1f7d5a;font-family:inherit;font-size:12.5px;font-weight:800;border-radius:13px;cursor:pointer;transition:.16s;}
.ph-export:active{transform:scale(.95);background:#cdeede;}
.ph-table-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:22px;background:var(--paper);-webkit-overflow-scrolling:touch;box-shadow:0 8px 22px -14px rgba(150,90,110,.3);}
.ph-table-scroll::-webkit-scrollbar{height:5px;}
.ph-table-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
.ph-table{border-collapse:collapse;font-size:12px;min-width:max-content;}
.ph-table th,.ph-table td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--line2);white-space:nowrap;}
.ph-table thead th{background:var(--paper2);font-size:11px;font-weight:700;position:sticky;top:0;min-width:104px;}
.ph-table thead .stk{min-width:56px;}
.ph-table tbody td,.ph-table tfoot td{min-width:104px;}
.ph-table tbody .stk,.ph-table tfoot .stk{min-width:56px;}
.ph-table .stk{position:sticky;left:0;background:var(--paper);text-align:left;font-weight:700;z-index:1;min-width:54px;}
.ph-table thead .stk{background:var(--paper2);}
.ph-table tbody input{width:94px;padding:6px 8px;border:1px solid transparent;border-radius:9px;font-size:12.5px;font-weight:600;text-align:right;background:transparent;color:var(--ink);transition:.15s;}
.ph-table tbody input:focus{outline:none;border-color:var(--pink);background:var(--pink-soft);}
.ph-table tbody tr:hover td{background:var(--paper2);}
.ph-table tbody tr:hover .stk{background:var(--paper2);}
.ph-table tr.act td{background:var(--pink-soft);}
.ph-table tr.act .stk{background:var(--pink-soft);color:var(--pink-d);}
.ph-table .sm{font-weight:800;color:var(--mut);background:var(--paper2);}
.ph-table tfoot td{border-top:2px solid var(--line);font-weight:800;}
.ph-table .tot.st-warn{color:var(--warn);background:var(--warnbg);}
.ph-table .tot.st-over{color:var(--over);background:var(--overbg);}
.ph-table .tot.st-ok{color:var(--ok);}
.ph-table .ceil td,.ph-table .buf td{font-weight:600;color:var(--mut);font-size:11px;}
.ph-table .wht td{font-weight:700;color:var(--mint-ink);font-size:11px;background:var(--mint-bg);border-top:1px solid #bce4d0;}
.ph-table .wht .stk{background:var(--mint-bg);color:#1f7d5a;}
.ph-table .wht .wht-ic{display:inline-flex;vertical-align:-2px;margin-right:3px;color:var(--mint-ink);}
.ph-table .wht .sm{color:#1f7d5a;background:#cdeede;}

/* bottom nav */
.ph-nav{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-around;background:rgba(255,250,248,.86);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);border-top:1px solid var(--line);padding:9px 18px calc(9px + env(safe-area-inset-bottom));box-shadow:0 -8px 22px -16px rgba(150,90,110,.34);}
.ph-nav button{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--mut);font-family:inherit;font-size:10.5px;font-weight:700;cursor:pointer;padding:7px 16px;border-radius:14px;transition:.22s cubic-bezier(.22,.7,.3,1);position:relative;}
.ph-nav button:active{transform:scale(.92);}
.ph-nav button.on{color:var(--pink-d);}
.ph-nav button.on svg{transform:translateY(-1px);}
.ph-nav button.on::before{content:"";position:absolute;top:0;width:20px;height:3px;border-radius:3px;background:var(--pink);box-shadow:0 1px 5px -1px rgba(230,62,114,.55);}
`;


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
